<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bunnycloud - Create Your Bunny</title>
    <link rel="stylesheet" href="../css/intro.css" />
    <link rel="stylesheet" href="../css/bunny-creator.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="creator-container">
      <div class="creator-card">
        <!-- Header -->
        <div class="creator-header">
          <h1 class="creator-title">Design Your Bunny</h1>
          <p class="creator-subtitle">Create your perfect companion</p>
        </div>

        <!-- Bunny Preview -->
        <div class="bunny-section">
          <div class="bunny-preview-box">
            <!-- SVG Bunny Avatar -->
            <svg
              viewBox="0 0 360 420"
              class="bunny-svg"
              id="bunnySVG"
              xmlns="http://www.w3.org/2000/svg"
            >
              <defs>
                <linearGradient
                  id="earGradientCreator"
                  x1="0"
                  y1="0"
                  x2="1"
                  y2="1"
                >
                  <stop offset="0%" stop-color="#ffe9f5" />
                  <stop offset="100%" stop-color="#f7c5e5" />
                </linearGradient>
                <radialGradient id="eyeGlowCreator" cx="50%" cy="50%" r="60%">
                  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
                  <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                </radialGradient>
              </defs>

              <ellipse
                cx="180"
                cy="395"
                rx="140"
                ry="27"
                fill="rgba(147, 117, 255, 0.14)"
              />

              <g id="earLeft">
                <ellipse
                  id="earLeftOuter"
                  cx="110"
                  cy="95"
                  rx="36"
                  ry="98"
                  fill="#ffffff"
                />
                <ellipse
                  id="earLeftInner"
                  cx="110"
                  cy="114"
                  rx="22"
                  ry="72"
                  fill="url(#earGradientCreator)"
                />
              </g>
              <g id="earRight">
                <ellipse
                  id="earRightOuter"
                  cx="250"
                  cy="95"
                  rx="36"
                  ry="98"
                  fill="#ffffff"
                />
                <ellipse
                  id="earRightInner"
                  cx="250"
                  cy="114"
                  rx="22"
                  ry="72"
                  fill="url(#earGradientCreator)"
                />
              </g>

              <g id="bunnyHead">
                <ellipse
                  id="bunnyHeadShape"
                  cx="180"
                  cy="170"
                  rx="92"
                  ry="98"
                  fill="#ffffff"
                />
                <ellipse cx="180" cy="170" rx="80" ry="84" fill="#ffffff" />
              </g>

              <g id="eyes">
                <ellipse cx="140" cy="160" rx="20" ry="26" fill="#2f2a49" />
                <ellipse cx="220" cy="160" rx="20" ry="26" fill="#2f2a49" />
                <circle cx="150" cy="148" r="6" fill="#ffffff" />
                <circle cx="230" cy="148" r="6" fill="#ffffff" />
                <circle cx="142" cy="163" r="9" fill="url(#eyeGlowCreator)" />
                <circle cx="222" cy="163" r="9" fill="url(#eyeGlowCreator)" />
              </g>

              <path
                d="M176 190c0 6.5-5.5 12-12.5 12S151 196.5 151 190s5.5-12 12.5-12 12.5 5.5 12.5 12Z"
                id="bunnyNose"
                fill="#ffbad3"
              />
              <path
                id="mouth"
                d="M168 205c7 12 22 12 29 0"
                stroke="#4f435e"
                stroke-width="3"
                stroke-linecap="round"
                fill="none"
              />
              <circle cx="125" cy="190" r="16" fill="#ffd8e8" opacity="0.85" />
              <circle cx="235" cy="190" r="16" fill="#ffd8e8" opacity="0.85" />

              <g id="bunnyBody">
                <path
                  d="M94 255c-12 24-14 48-14 64 0 18 12 34 28 39 16 5 32 8 47 8h32c15 0 31-3 47-8 16-5 28-21 28-39 0-16-2-40-14-64-11-20-33-35-71-35-38 0-60 15-71 35Z"
                  fill="#ffffff"
                />
                <ellipse
                  cx="180"
                  cy="295"
                  rx="60"
                  ry="76"
                  fill="#f8f3ff"
                  opacity="0.95"
                />
              </g>

              <g id="paws">
                <ellipse cx="118" cy="305" rx="20" ry="28" fill="#ffffff" />
                <ellipse cx="242" cy="305" rx="20" ry="28" fill="#ffffff" />
              </g>

              <g id="clothingShirt" opacity="0" pointer-events="none">
                <rect
                  x="118"
                  y="234"
                  width="110"
                  height="78"
                  rx="20"
                  fill="#ff7fb3"
                />
                <circle cx="140" cy="246" r="10" fill="#ff91c0" />
                <circle cx="220" cy="246" r="10" fill="#ff91c0" />
              </g>

              <g id="clothingHoodie" opacity="0" pointer-events="none">
                <path
                  d="M112 236c0-36 46-52 68-48s68 12 68 48v66c0 12-10 22-22 22H134c-12 0-22-10-22-22v-66Z"
                  fill="#8f69d4"
                />
                <path
                  d="M132 246c8-12 26-18 40-18s32 6 40 18"
                  stroke="#9ea2ff"
                  stroke-width="4"
                  fill="none"
                  stroke-linecap="round"
                />
              </g>

              <g id="clothingDress" opacity="0" pointer-events="none">
                <path
                  d="M116 244c-8 24-12 72-12 86 0 8 7 16 15 16h116c8 0 15-8 15-16 0-14-4-62-12-86-8-21-26-30-58-30s-50 9-58 30Z"
                  fill="#ff65b4"
                />
                <path d="M132 260h96" stroke="#ff9ed4" stroke-width="3" />
              </g>

              <g id="accessoriesGlasses" opacity="0" pointer-events="none">
                <rect
                  x="130"
                  y="147"
                  width="32"
                  height="26"
                  rx="8"
                  fill="none"
                  stroke="#3b345a"
                  stroke-width="3"
                />
                <rect
                  x="198"
                  y="147"
                  width="32"
                  height="26"
                  rx="8"
                  fill="none"
                  stroke="#3b345a"
                  stroke-width="3"
                />
                <line
                  x1="162"
                  y1="160"
                  x2="198"
                  y2="160"
                  stroke="#3b345a"
                  stroke-width="3"
                />
              </g>

              <g id="accessoriesCrown" opacity="0" pointer-events="none">
                <path
                  d="M126 100 L144 74 L158 94 L180 68 L202 94 L216 74 L234 100 L232 118 L128 118 Z"
                  fill="#ffd064"
                />
                <circle cx="144" cy="68" r="6" fill="#ff7fb3" />
                <circle cx="180" cy="58" r="7" fill="#ff7fb3" />
                <circle cx="216" cy="68" r="6" fill="#ff7fb3" />
              </g>

              <g id="accessoriesHeadphones" opacity="0" pointer-events="none">
                <path
                  d="M136 150c0-20 24-26 44-26s44 6 44 26"
                  fill="none"
                  stroke="#3b345a"
                  stroke-width="8"
                  stroke-linecap="round"
                />
                <rect
                  x="118"
                  y="154"
                  width="28"
                  height="40"
                  rx="14"
                  fill="#3b345a"
                />
                <rect
                  x="214"
                  y="154"
                  width="28"
                  height="40"
                  rx="14"
                  fill="#3b345a"
                />
                <circle cx="132" cy="174" r="8" fill="#ff7fb3" />
                <circle cx="246" cy="174" r="8" fill="#ff7fb3" />
              </g>
            </svg>
          </div>

          <!-- Bunny Name Input -->
          <div class="bunny-name-input">
            <input
              type="text"
              id="bunnyName"
              placeholder="Enter bunny name"
              maxlength="15"
            />
            <span class="char-count"><span id="charCount">0</span>/15</span>
          </div>
        </div>

        <!-- Customization Options -->
        <div class="creator-options">
          <!-- Body Color -->
          <div class="creator-section">
            <h3 class="section-title">Body Color</h3>
            <div class="options-grid">
              <button
                class="color-option active"
                data-bodycolor="#ffffff"
                data-innerearscolor="#ffc0d9"
                title="White"
              ></button>
              <button
                class="color-option"
                data-bodycolor="#fff5f7"
                data-innerearscolor="#ffb3d9"
                title="Cream"
              ></button>
              <button
                class="color-option"
                data-bodycolor="#ffe4e1"
                data-innerearscolor="#ff99b3"
                title="Blush"
              ></button>
              <button
                class="color-option"
                data-bodycolor="#f0f8ff"
                data-innerearscolor="#b3d9ff"
                title="Alice Blue"
              ></button>
              <button
                class="color-option"
                data-bodycolor="#fffacd"
                data-innerearscolor="#ffeb99"
                title="Lemon"
              ></button>
            </div>
          </div>

          <!-- Clothing -->
          <div class="creator-section">
            <h3 class="section-title">Clothing</h3>
            <div class="options-grid-buttons">
              <button class="clothing-btn active" data-clothing="none">
                None
              </button>
              <button class="clothing-btn" data-clothing="shirt">Shirt</button>
              <button class="clothing-btn" data-clothing="hoodie">
                Hoodie
              </button>
              <button class="clothing-btn" data-clothing="dress">Dress</button>
            </div>
          </div>

          <!-- Accessories -->
          <div class="creator-section">
            <h3 class="section-title">Accessories</h3>
            <div class="options-grid-buttons">
              <button class="accessories-btn active" data-accessories="none">
                None
              </button>
              <button class="accessories-btn" data-accessories="glasses">
                Glasses
              </button>
              <button class="accessories-btn" data-accessories="crown">
                Crown
              </button>
              <button class="accessories-btn" data-accessories="headphones">
                Headphones
              </button>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="creator-actions">
          <button id="randomButton" class="btn btn-secondary">Randomize</button>
          <button id="finishButton" class="btn btn-primary">
            Save and Continue
          </button>
        </div>
      </div>
    </div>

    <script src="../js/bunny-creator.js"></script>
  </body>
</html>
