<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bunnycloud - Register</title>
    <link rel="stylesheet" href="../css/intro.css" />
    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body>
    <div class="intro">
      <div class="intro-content">
        <img
          src="../images/logo.png"
          alt="Bunnycloud Logo"
          class="intro-logo-img"
        />

        <h2 id="registerTitle" class="register-title">Create Account</h2>
        <p id="registerSubtitle" class="register-subtitle">
          Sign up to start listening
        </p>

        <div class="form-group">
          <input
            type="text"
            id="username"
            placeholder="Your username"
            required
          />
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />
        </div>

        <button id="submitButton">Continue</button>
      </div>
    </div>

    <script src="../js/register.js"></script>
  </body>
</html>
