<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bunnycloud - Prihlásenie</title>
    <link rel="stylesheet" href="../css/intro.css" />
    <link rel="stylesheet" href="../css/register.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="register-container">
      <div class="register-card">
        <div style="text-align: center; margin-bottom: 20px">
          <img
            src="../images/logo.png"
            alt="Bunnycloud Logo"
            class="register-logo"
          />
        </div>

        <h2 class="register-title">Prihlásenie</h2>
        <p class="register-subtitle">
          Vstúp späť do Bunnycloud a pokračuj tam, kde si prestal.
        </p>

        <div id="errorMessage" class="error-message"></div>

        <form class="register-form" id="loginForm">
          <div class="input-field">
            <input type="email" id="loginEmail" placeholder="Email" required />
          </div>

          <div class="input-field">
            <input
              type="password"
              id="loginPassword"
              placeholder="Heslo"
              required
              minlength="6"
            />
          </div>

          <button type="submit" class="register-btn" id="loginButton">
            Prihlásiť sa
          </button>
        </form>

        <div class="login-link">
          Nemáš účet?
          <a href="register.html">Vytvor si ho</a>
        </div>
      </div>
    </div>

    <script src="../js/login.js"></script>
  </body>
</html>
