<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bunnycloud</title>
    <link rel="stylesheet" href="css/intro.css" />
  </head>
  <body>
    <div id="splash-screen" class="splash-container">
      <div class="splash-logo-wrapper">
        <img
          src="images/logo.png"
          alt="Bunnycloud Logo"
          class="bunny-logo-img"
        />
        <h1 class="splash-title">Bunnycloud</h1>
      </div>
    </div>

    <div id="intro-screen" class="intro hidden">
      <div class="intro-content">
        <img
          src="images/logo.png"
          alt="Bunnycloud Logo"
          class="intro-logo-img"
        />
        <h1 class="logo">Bunnycloud</h1>
        <p class="subtitle">Your music. Your cloud.</p>
        <button id="startButton">Get Started</button>
      </div>
    </div>

    <script src="js/intro.js"></script>
  </body>
</html>
